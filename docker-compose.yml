version: "3.9"

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — primary data store
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: promptlock
      POSTGRES_USER: promptlock
      POSTGRES_PASSWORD: promptlock_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptlock"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Redis — task queue (Celery) + caching
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for prompt blobs
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # MinIO bucket initializer — one-shot to create the prompts bucket
  # --------------------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin_dev &&
      mc mb --ignore-existing local/promptlock-objects &&
      mc anonymous set none local/promptlock-objects &&
      echo 'MinIO bucket ready.'
      "
    restart: "no"

  # --------------------------------------------------------------------------
  # FastAPI application server
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://promptlock:promptlock_dev@postgres:5432/promptlock"
      REDIS_URL: "redis://redis:6379/0"
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin_dev"
      S3_BUCKET: "promptlock-objects"
      JWT_SECRET: "change-me-in-production-use-a-secure-random-string"
      JWT_ALGORITHM: "HS256"
      JWT_EXPIRE_MINUTES: "60"
      ENVIRONMENT: "development"
      LOG_LEVEL: "info"
      PROMPTLOCK_API_VERSION: "0.2.0"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./api:/app/api:ro   # hot-reload in dev (uvicorn --reload)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
